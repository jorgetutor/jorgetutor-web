# .github/workflows/deploy.yml

name: Audit, Build, and Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:
  # Run the workflow every day at 5:00 AM UTC
  schedule:
    - cron: '0 5 * * *'

# Allow this job to clone the repo, commit fixes, and create a page deployment
permissions:
  contents: write
  pages: write
  id-token: write

# Define environment variables shared across all jobs in the workflow
env:
  NODE_VERSION: '24'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:

  audit:
    runs-on: ubuntu-latest
    # This 'if' condition is crucial to prevent infinite loops.
    # It stops the job from running if the trigger was a commit made by this workflow.
    if: "!contains(github.event.head_commit.message, 'chore(security):')"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run pnpm audit
        id: audit
        run: pnpm audit
        continue-on-error: true # Continue even if vulnerabilities are found

      - name: Run pnpm audit fix if vulnerabilities were found
        if: steps.audit.outcome == 'failure'
        run: pnpm audit --fix
        continue-on-error: true  # some vulns require --force (breaking changes); fix manually

      - name: Commit and push changes
        if: steps.audit.outcome == 'failure'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore(security): Apply automatic pnpm audit fix'
          branch: main
          file_pattern: package.json pnpm-lock.yaml

  build:
    needs: audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repository using git
        uses: actions/checkout@v4
      - name: Set up pnpm
        uses: pnpm/action-setup@v4
      - name: Install, build, and upload your site
        uses: withastro/action@v3
        with:
          node-version: ${{ env.NODE_VERSION }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
