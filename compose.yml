services:
  astro:
    image: node:24-alpine
    container_name: astro-app
    working_dir: /app
    command: sh -c "corepack enable && pnpm install && pnpm dev"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
      - pnpm-store:/app/.pnpm-store
    ports:
      - "4321:4321"

volumes:
  node_modules:
  pnpm-store:
